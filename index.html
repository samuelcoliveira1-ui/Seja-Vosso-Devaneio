<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragmento Maldito</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('1000813526.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #2a221b;
            margin: 0;
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .poema-container {
            max-width: 600px;
            text-align: left;
            font-family: 'Homemade Apple', cursive;
            color: #1a1714;
            font-size: 1.2rem;
            line-height: 2.5;
            /* Leve inclinação para parecer escrita manual real */
            transform: rotate(-1deg);
        }

        .estrofe {
            margin-bottom: 40px;
        }

        /* Estilo da Censura */
        .censurado {
            background-color: #0c0c0c; /* Tarja preta */
            color: #0c0c0c; /* Esconde o texto com a mesma cor */
            display: inline-block;
            line-height: 0.8;
            padding: 0 5px;
            border-radius: 2px;
            /* Filtro de borrão para garantir que nada seja lido */
            filter: blur(3px);
            user-select: none; /* Impede que o jogador copie/cole para ler */
            cursor: default;
            position: relative;
        }

        /* Efeito de rascunho extra sobre a censura */
        .censurado::after {
            content: "XXXXXXXXXXXX";
            position: absolute;
            left: 0;
            top: 0;
            color: #000;
            opacity: 0.8;
            letter-spacing: -2px;
        }
    </style>
</head>
<body>

    <div class="poema-container">
        
        <div class="estrofe">
            Pobre demônio que queres morrer<br>
            Morte segue o <span class="censurado">Senhor das Moscas</span><br>
            Mas que maldição que é sempre viver<br>
            Sem amar nenhuma pessoa
        </div>

        <div class="estrofe">
            Pobre <span class="censurado">Beelzebub</span>, tanta morte em volta<br>
            Diga <span class="censurado">Beelzebub</span>, por que tanto choras?<br>
            Porque eu já perdi tudo<br>
            Pobre <span class="censurado">Beelzebub</span>!
        </div>

    </div>

</body>
</html>
